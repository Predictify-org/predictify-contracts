name: Soroban Smart Contracts CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
    - name: Install Rust target for Soroban
      run: |
        source $HOME/.cargo/env
        rustup target add wasm32v1-none
    - name: Install Stellar CLI with Homebrew
      run: |
        brew update
        brew install stellar-cli
        stellar --version
    - name: Build Cargo project
      run: |
        source $HOME/.cargo/env
        cargo build --verbose

    - name: Build Soroban contract
      run: |
        source $HOME/.cargo/env
        cargo build --release --target wasm32v1-none

    - name: Optimize WASM
      run: |
        source $HOME/.cargo/env
        WASM_FILE=$(find target/wasm32v1-none/release -name "*.wasm" | head -n 1)
        if [ -n "$WASM_FILE" ] && command -v stellar &> /dev/null; then
          echo "Optimizing WASM..."
          stellar contract optimize --wasm "$WASM_FILE" || true
        fi

    - name: Check WASM size
      run: |
        source $HOME/.cargo/env
        bash scripts/check_wasm_size.sh

    - name: Run Cargo tests
      run: |
        source $HOME/.cargo/env
        cargo test --verbose

